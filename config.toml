[server]
host = "0.0.0.0"
port = 8080
log_level = "info,sqlx::query=warn"

[database]
url = "sqlite:./data/mediadrive.db?mode=rwc"
max_connections = 5
auto_migrate = true

[storage]
backend = "fs"

[storage.fs]
root = "./uploads"

[storage.s3]
bucket = ""
region = ""
endpoint = ""
access_key_id = ""
secret_access_key = ""

[auth]
jwt_secret = "dev-secret-change-in-production"
access_token_ttl_secs = 1800

[webdav]
enabled = true
prefix = "/dav"

[image]
max_upload_size = 20971520
compression_quality = 80
cdn_base_url = ""
allowed_referers = []

[video]
ffmpeg_path = "ffmpeg"
ffprobe_path = "ffprobe"
max_concurrent = 1
default_profiles = ["720p"]
poll_interval_secs = 5

[tmdb]
api_key = ""
language = "zh-CN"
