[server]
host = "0.0.0.0"
port = 8080

[database]
url = "sqlite:./data/mediadrive.db?mode=rwc"
max_connections = 5
auto_migrate = true

[storage]
backend = "fs"

[storage.fs]
root = "./uploads"

[storage.s3]
bucket = "mediadrive"
region = "us-east-1"
endpoint = ""
access_key_id = ""
secret_access_key = ""

[auth]
jwt_secret = "dev-secret-change-in-production"
access_token_ttl_secs = 1800
