[server]
host = "0.0.0.0"
port = 8080

[database]
url = "sqlite:./data/mediadrive.db?mode=rwc"
max_connections = 5
auto_migrate = true

[storage]
backend = "fs"

[storage.fs]
root = "./uploads"

[storage.s3]
bucket = ""
region = ""
endpoint = ""
access_key_id = ""
secret_access_key = ""

[auth]
jwt_secret = "change-me-in-production"
access_token_ttl_secs = 1800

[webdav]
enabled = true
prefix = "/dav"
